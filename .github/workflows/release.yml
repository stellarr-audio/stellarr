name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Required secrets for signed + notarised builds (all optional — workflow
# produces an unsigned DMG when they are absent):
#
#   APPLE_CERTIFICATE           base64-encoded .p12 Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD  password for the .p12
#   APPLE_SIGNING_IDENTITY      full cert Common Name, e.g.
#                               "Developer ID Application: Your Name (TEAMID)"
#   APPLE_TEAM_ID               10-character Team ID
#   APPLE_ID                    Apple ID email used for notarisation
#   APPLE_APP_PASSWORD          app-specific password generated at appleid.apple.com
#
# NOTE: This workflow targets a self-hosted macOS runner whose filesystem and
# keychain state persist across runs. Every step that writes to /tmp, creates a
# keychain, or configures a CMake build directory must assume arbitrary leftover
# state from a previously failed run and clean up defensively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: Stellarr

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  build-release:
    runs-on: self-hosted
    # Hoist signing secrets to job-level env so the step-level `if:`
    # conditions can read them (they are evaluated before step env is applied).
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Runner is self-hosted — clean any leftover state from prior runs
      # (failed or otherwise) before doing anything that assumes a clean slate.
      - name: Clean runner state from previous runs
        run: |
          rm -f /tmp/stellarr-cert-*.p12 || true
          rm -rf build-release || true
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build UI
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_ENV: production
        run: cd ui && npm run build

      - name: Configure CMake (Release)
        run: cmake -B build-release -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DSTELLARR_SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Build engine
        run: cmake --build build-release --config Release -j4

      # ── Code signing (requires Apple Developer secrets) ──

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        run: |
          CERT_FILE="/tmp/stellarr-cert-$$.p12"
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          # Guarantee the decoded cert is removed on any exit (success, error,
          # signal). Avoids leaving a .p12 on the self-hosted runner if a later
          # security command fails mid-step.
          trap 'rm -f "$CERT_FILE"' EXIT

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Sign app bundle
        if: env.APPLE_CERTIFICATE != ''
        run: |
          APP_PATH="build-release/Stellarr_artefacts/Release/Standalone/${APP_NAME}.app"
          codesign --deep --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      # ── Package as .dmg ──

      - name: Create DMG
        run: |
          APP_PATH="build-release/Stellarr_artefacts/Release/Standalone/${APP_NAME}.app"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"

          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "$APP_NAME" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG_NAME"

          rm -rf "$STAGING"

      - name: Sign DMG
        if: env.APPLE_CERTIFICATE != ''
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_NAME"

      # ── Notarisation (requires Apple ID secrets) ──

      - name: Notarise DMG
        if: env.APPLE_CERTIFICATE != ''
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"

      # ── Cleanup ──

      # Runs even if the secret was never set or an earlier step failed —
      # the delete is a no-op when the keychain is absent.
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      # ── Upload to GitHub Release ──

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          gh release upload "$GITHUB_REF_NAME" "$DMG_NAME" --clobber || \
            gh release create "$GITHUB_REF_NAME" "$DMG_NAME" --generate-notes
