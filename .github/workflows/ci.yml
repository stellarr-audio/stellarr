name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'engine/**'
              - 'ui/**'
              - 'CMakeLists.txt'
              - '.github/workflows/ci.yml'

  run-build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: TypeScript check
        run: cd ui && npx tsc --noEmit

      - name: Build UI
        run: cd ui && npm run build

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build engine
        run: cmake --build build -j4

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # Gate job — satisfies the required "build-and-test" status check.
  # Passes when the build succeeds OR when path filters skip it.
  build-and-test:
    if: always()
    needs: [changes, run-build]
    runs-on: self-hosted
    steps:
      - run: |
          if [ "${{ needs.run-build.result }}" = "failure" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "OK"
