name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

# Required secrets for signed + notarised builds (all optional — workflow
# produces an unsigned DMG when they are absent):
#
#   APPLE_CERTIFICATE           base64-encoded .p12 Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD  password for the .p12
#   APPLE_SIGNING_IDENTITY      full cert Common Name, e.g.
#                               "Developer ID Application: Your Name (TEAMID)"
#   APPLE_TEAM_ID               10-character Team ID
#   APPLE_ID                    Apple ID email used for notarisation
#   APPLE_APP_PASSWORD          app-specific password generated at appleid.apple.com
#
# NOTE: This workflow targets a self-hosted macOS runner whose filesystem and
# keychain state persist across runs. Every step that writes to /tmp, creates a
# keychain, or configures a CMake build directory must assume arbitrary leftover
# state from a previously failed run and clean up defensively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: Stellarr

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  build-release:
    runs-on: self-hosted
    # Hoist signing secrets to job-level env so the step-level `if:`
    # conditions can read them (they are evaluated before step env is applied).
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Runner is self-hosted — clean any leftover state from prior runs
      # (failed or otherwise) before doing anything that assumes a clean slate.
      - name: Clean runner state from previous runs
        run: |
          rm -f /tmp/stellarr-cert-*.p12 || true
          rm -rf build-release || true
          security delete-keychain build.keychain 2>/dev/null || true

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build UI
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_ENV: production
        run: cd ui && npm run build

      - name: Configure CMake (Release)
        run: cmake -B build-release -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DSTELLARR_SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Build engine
        run: cmake --build build-release --config Release -j4

      # ── Code signing (requires Apple Developer secrets) ──

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        run: |
          CERT_FILE="/tmp/stellarr-cert-$$.p12"
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          # Guarantee the decoded cert is removed on any exit (success, error,
          # signal). Avoids leaving a .p12 on the self-hosted runner if a later
          # security command fails mid-step. rm -P overwrites before unlink;
          # falls back to -f on filesystems that reject -P.
          trap 'rm -P "$CERT_FILE" 2>/dev/null || rm -f "$CERT_FILE"' EXIT

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Sign app bundle
        if: env.APPLE_CERTIFICATE != ''
        run: |
          APP_PATH="build-release/Stellarr_artefacts/Release/Standalone/${APP_NAME}.app"
          SPARKLE="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          ENTITLEMENTS="engine/Stellarr.entitlements"

          # codesign --deep can't resolve nested frameworks that carry their
          # own helper apps and XPC services. Sign the Sparkle leaves first,
          # work up to the framework, then sign the outer app on its own.
          #
          # Functions (not string variables) are used so the signing
          # identity — which contains spaces — survives as a single arg.
          # Nested components inherit the outer app's entitlements at
          # launch, so only the outer app gets --entitlements.
          sign_nested() {
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$1"
          }
          sign_app() {
            codesign --force --options runtime --timestamp \
              --entitlements "$ENTITLEMENTS" \
              --sign "$APPLE_SIGNING_IDENTITY" "$1"
          }

          sign_nested "$SPARKLE/Versions/B/XPCServices/Downloader.xpc"
          sign_nested "$SPARKLE/Versions/B/XPCServices/Installer.xpc"
          sign_nested "$SPARKLE/Versions/B/Updater.app"
          sign_nested "$SPARKLE/Versions/B/Autoupdate"
          sign_nested "$SPARKLE/Versions/B"
          sign_app "$APP_PATH"

          codesign --verify --strict --verbose=2 "$APP_PATH"

      # ── Package as .dmg ──

      - name: Create DMG
        run: |
          APP_PATH="build-release/Stellarr_artefacts/Release/Standalone/${APP_NAME}.app"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"

          STAGING=$(mktemp -d)
          # ditto (not cp -R) — cp -R dereferences symlinks and breaks
          # the embedded Sparkle.framework's Versions/Current layout.
          ditto "$APP_PATH" "$STAGING/$(basename "$APP_PATH")"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "$APP_NAME" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG_NAME"

          rm -rf "$STAGING"

      - name: Sign DMG
        if: env.APPLE_CERTIFICATE != ''
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_NAME"

      # ── Notarisation (requires Apple ID secrets) ──

      - name: Notarise DMG
        if: env.APPLE_CERTIFICATE != ''
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"

      # ── Cleanup ──

      # Runs even if the secret was never set or an earlier step failed —
      # the delete is a no-op when the keychain is absent.
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      # ── Upload to GitHub Release ──

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          gh release upload "$GITHUB_REF_NAME" "$DMG_NAME" --clobber || \
            gh release create "$GITHUB_REF_NAME" "$DMG_NAME" --generate-notes

      # ── Appcast update ──

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY_PROD }}
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          SIGN=./build-release/_deps/sparkle-src/bin/sign_update

          if [ ! -x "$SIGN" ]; then
            echo "sign_update not found; Sparkle was not fetched correctly"
            exit 1
          fi

          # sign_update reads the private key from a file. Write to a fresh
          # temp file, sign, then shred.
          KEYFILE=$(mktemp)
          trap 'rm -P "$KEYFILE" 2>/dev/null || rm -f "$KEYFILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"

          # -p prints just the bare signature; without it sign_update emits
          # a full XML attribute fragment that would double-nest when our
          # appcast renderer wraps it in another attribute.
          SIGNATURE=$("$SIGN" -p "$DMG_NAME" --ed-key-file "$KEYFILE")
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"

      - name: Prepare appcast update
        run: |
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}-macOS-arm64.dmg"
          VERSION="${GITHUB_REF_NAME#v}"
          SIZE=$(stat -f%z "$DMG_NAME")
          PUBDATE=$(LC_ALL=C date -u +"%a, %d %b %Y %H:%M:%S %z")
          DL_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}"

          node --experimental-strip-types scripts/update-appcast.ts \
            --appcast   web/public/appcast.xml \
            --version   "$VERSION" \
            --url       "$DL_URL" \
            --length    "$SIZE" \
            --signature "$SPARKLE_SIGNATURE" \
            --pubdate   "$PUBDATE" \
            --notes-url "$NOTES_URL"

          # Fail fast if the new entry did not land.
          if ! grep -q "<sparkle:version>${VERSION}</sparkle:version>" web/public/appcast.xml; then
            echo "Appcast update failed: new entry not found"
            exit 1
          fi

      # Exchange the stellarr-release-bot App's credentials for a short-lived
      # installation token. Using github.token here instead would tag the PR
      # as created by GITHUB_TOKEN, which by policy does NOT trigger further
      # workflow runs — the required build-and-test status check would never
      # fire and auto-merge would stall. An App token triggers workflows
      # normally and also gives the bot its own "stellarr-release-bot[bot]"
      # identity on commits/PRs.
      - name: Generate bot App token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.STELLARR_BOT_APP_ID }}
          private-key: ${{ secrets.STELLARR_BOT_PRIVATE_KEY }}

      - name: Open bot PR with updated appcast
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          # Commits created via plain `git commit` on the runner are
          # unsigned — branch protection ("commits must have verified
          # signatures") will block the resulting PR. Use GitHub's
          # createCommitOnBranch GraphQL mutation instead: commits pushed
          # via the API are signed by GitHub's web-flow key and appear
          # as "Verified" without needing a GPG key on the runner.
          BRANCH="chore/appcast-${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"

          MAIN_SHA=$(gh api "repos/${REPO}/git/refs/heads/main" --jq .object.sha)

          # Create the branch ref first — createCommitOnBranch can only
          # commit onto an existing branch.
          gh api -X POST "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="${MAIN_SHA}" > /dev/null

          # macOS base64 wraps at 76 chars by default; -b 0 disables wrapping
          # so the encoded payload is a single line suitable for JSON embedding.
          APPCAST_B64=$(base64 -b 0 -i web/public/appcast.xml)

          # Build the GraphQL body via jq so all values are correctly
          # escaped, then POST it directly (avoids gh's -F flag limitations
          # on nested objects).
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg msg "chore(release): update appcast for ${GITHUB_REF_NAME}" \
            --arg contents "$APPCAST_B64" \
            --arg oid "$MAIN_SHA" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $msg },
                  fileChanges: { additions: [ { path: "web/public/appcast.xml", contents: $contents } ] },
                  expectedHeadOid: $oid
                }
              }
            }' | gh api graphql --input -

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): update appcast for ${GITHUB_REF_NAME}" \
            --body "Auto-generated by the release workflow. Adds the ${GITHUB_REF_NAME} entry to web/public/appcast.xml so existing installs can see the new version. Commit is signed by GitHub's web-flow key via createCommitOnBranch."

          # Best-effort: enable auto-merge so the PR merges as soon as
          # branch protection rules are satisfied. Non-fatal if repo config
          # disallows auto-merge.
          gh pr merge --auto --squash "$BRANCH" || echo "auto-merge unavailable; merge the PR manually"
